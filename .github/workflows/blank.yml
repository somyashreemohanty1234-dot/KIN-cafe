<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIN Cafe - Crafted with Elegance & Precision</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2d1b69;
            --secondary: #f4f1e8;
            --accent: #d4a574;
            --text-dark: #1a1a1a;
            --text-light: #666;
            --white: #ffffff;
            --shadow: 0 20px 60px rgba(0,0,0,0.1);
            --shadow-lg: 0 30px 80px rgba(0,0,0,0.15);
        }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            padding: 1rem 0;
            transition: all 0.3s ease;
        }

        nav {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 500;
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .cta-btn {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
        }

        .cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(45, 27, 105, 0.7), rgba(212, 165, 116, 0.3)), 
                        url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800"><defs><radialGradient id="grain" cx="50%" cy="50%"><stop offset="0%" stop-color="%23ffffff" stop-opacity="0.1"/><stop offset="100%" stop-color="%23ffffff" stop-opacity="0"/></radialGradient></defs><rect width="1200" height="800" fill="url(%23grain)"/><filter id="noise"><feTurbulence baseFrequency="0.5" numOctaves="1" /><feBlend mode="multiply"/></filter><rect width="1200" height="800" fill="%23f4f1e8" filter="url(%23noise)"/></svg>');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            position: relative;
        }

        .hero-content h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 700;
            margin-bottom: 1rem;
            opacity: 0;
            animation: fadeInUp 1s ease forwards;
        }

        .hero-content .slogan {
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            font-weight: 300;
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeInUp 1s ease 0.3s forwards;
        }

        .hero-location {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            padding: 1.5rem 3rem;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 500;
            opacity: 0;
            animation: fadeInUp 1s ease 0.6s forwards;
        }

        /* Sections */
        .section {
            padding: 120px 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 5vw, 4rem);
            text-align: center;
            margin-bottom: 4rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Specialties Grid */
        .specialties-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 3rem;
            margin-top: 4rem;
        }

        .specialty-card {
            background: var(--white);
            padding: 3rem 2.5rem;
            border-radius: 24px;
            box-shadow: var(--shadow);
            text-align: center;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .specialty-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
        }

        .specialty-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow-lg);
        }

        .specialty-icon {
            font-size: 4rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1.5rem;
        }

        .specialty-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }

        /* Features */
        .features {
            background: var(--secondary);
            position: relative;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 3rem;
        }

        .feature-item {
            text-align: center;
            padding: 2rem;
        }

        .feature-number {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: block;
            margin-bottom: 1rem;
        }

        /* CTA Section */
        .cta-section {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            text-align: center;
            padding: 100px 5%;
        }

        .cta-content h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 5vw, 4rem);
            margin-bottom: 1.5rem;
        }

        .contact-info {
            font-size: 1.5rem;
            font-weight: 500;
            margin-top: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }

        /* Footer */
        footer {
            background: var(--text-dark);
            color: white;
            text-align: center;
            padding: 3rem 5%;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Mobile Menu */
        .mobile-menu {
            display: none;
            flex-direction: column;
            gap: 1rem;
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }
            
            .mobile-menu {
                display: flex;
            }

            .hero-content h1 {
                font-size: 3rem;
            }

            .specialties-grid {
                grid-template-columns: 1fr;
            }

            .contact-info {
                flex-direction: column;
                gap: 1rem;
                font-size: 1.3rem;
            }
        }

        /* Scroll animations */
        .fade-in {
            opacity: 0;
            transform: translateY(50px);
            transition: all 0.8s ease;
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <nav>
            <div class="logo">KIN</div>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#specialties">Menu</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
            <a href="tel:9078000545" class="cta-btn">Order Now</a>
            <div class="mobile-menu">
                <a href="#home">Home</a>
                <a href="#specialties">Menu</a>
                <a href="#about">About</a>
                <a href="#contact">Contact</a>
            </div>
        </nav>
    </header>

    <!-- Hero Section -->
    <section id="home" class="hero">
        <div class="hero-content">
            <h1>KIN</h1>
            <p class="slogan">Crafted with Elegance & Precision</p>
            <div class="hero-location">
                Basanti Colony, Rourkela<br>
                In front of the old court
            </div>
        </div>
    </section>

    <!-- Specialties Section -->
    <section id="specialties" class="section fade-in">
        <h2 class="section-title">Our Specialties</h2>
        <div class="specialties-grid">
            <div class="specialty-card">
                <i class="fas fa-birthday-cake specialty-icon"></i>
                <h3>Luxury Cakes</h3>
                <p>Bespoke celebration cakes crafted with precision and the finest ingredients for your special moments.</p>
            </div>
            <div class="specialty-card">
                <i class="fas fa-drumstick-bite specialty-icon"></i>
                <h3>Signature Continental</h3>
                <p>Authentic continental cuisine blending global flavors with modern sophistication.</p>
            </div>
            <div class="specialty-card">
                <i class="fas fa-clock specialty-icon"></i>
                <h3>Fast Service</h3>
                <p>Your order ready in just 15 minutes without compromising on quality or presentation.</p>
            </div>
        </div>
    </section>

    <!-- Features Section -->
    <section class="features section fade-in">
        <div class="features-grid">
            <div class="feature-item">
                <span class="feature-number">15</span>
                <h3>Minute Service</h3>
                <p>Lightning-fast service without sacrificing quality</p>
            </div>
            <div class="feature-item">
                <span class="feature-number">Quiet</span>
                <h3>Luxury Ambiance</h3>
                <p>Sophisticated, serene atmosphere perfect for any occasion</p>
            </div>
            <div class="feature-item">
                <span class="feature-number">100%</span>
                <h3>Fresh Ingredients</h3>
                <p>Every dish crafted with premium, fresh ingredients daily</p>
            </div>
        </div>
    </section>

    <!-- CTA Section -->
    <section id="contact" class="cta-section">
        <div class="cta-content">
            <h2>Ready to Experience KIN?</h2>
            <p>Join us for an unforgettable culinary journey</p>
            <div class="contact-info">
                <i class="fas fa-phone fa-2x"></i>
                <a href="tel:9078000545" style="color: white; text-decoration: none; font-weight: 600;">9078000545</a>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 KIN Cafe. Crafted with Elegance & Precision. Basanti Colony, Rourkela.</p>
    </footer>

    <script>
        // Smooth scrolling
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });

        // Navbar scroll effect
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            if (window.scrollY > 100) {
                header.style.background = 'rgba(255, 255, 255, 0.98)';
                header.style.boxShadow = '0 10px 30px rgba(0,0,0,0.1)';
            } else {
                header.style.background = 'rgba(255, 255, 255, 0.95)';
                header.style.boxShadow = 'none';
            }
        });

        // Scroll animations
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.fade-in').forEach(el => {
            observer.observe(el);
        });

        // Phone number click animation
        document.querySelectorAll('a[href^="tel:"]').forEach(link => {
            link.addEventListener('click', function() {
                this.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    this.style.transform = 'scale(1)';
                }, 150);
            });
        });
    </script>
</body>
</html>
